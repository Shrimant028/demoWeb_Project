<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>User Profile</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="profile-container">
    <div class="profile-header">
      <div class="avatar-wrapper">
        <img
          id="avatar"
          src="https://ui-avatars.com/api/?name=John+Doe&background=4f8ef7&color=fff&size=128"
          alt="Profile Avatar"
          class="avatar"
        />
        <button class="change-avatar-btn" id="changeAvatarBtn" title="Change photo">&#9998;</button>
        <input type="file" id="avatarInput" accept="image/*" hidden />
      </div>
      <div class="profile-info">
        <h1 class="profile-name" id="profileName">John Doe</h1>
        <p class="profile-handle">@johndoe</p>
        <p class="profile-bio" id="profileBio">Frontend developer &amp; coffee enthusiast. Building great web experiences one component at a time.</p>
      </div>
    </div>

    <div class="profile-stats">
      <div class="stat">
        <span class="stat-value">128</span>
        <span class="stat-label">Posts</span>
      </div>
      <div class="stat">
        <span class="stat-value">4.2k</span>
        <span class="stat-label">Followers</span>
      </div>
      <div class="stat">
        <span class="stat-value">312</span>
        <span class="stat-label">Following</span>
      </div>
    </div>

    <div class="profile-actions">
      <button class="btn btn-primary" id="editProfileBtn">Edit Profile</button>
      <button class="btn btn-secondary">Message</button>
    </div>

    <div class="profile-details">
      <h2 class="section-title">Details</h2>
      <ul class="details-list">
        <li><span class="icon">&#128205;</span> San Francisco, CA</li>
        <li><span class="icon">&#128188;</span> Works at Acme Corp</li>
        <li><span class="icon">&#128279;</span> <a href="#" class="profile-link">johndoe.dev</a></li>
        <li><span class="icon">&#128197;</span> Joined March 2019</li>
      </ul>
    </div>

    <!-- Edit Profile Modal -->
    <div class="modal-overlay" id="editModal" role="dialog" aria-modal="true" aria-labelledby="modalTitle" hidden>
      <div class="modal">
        <h2 class="modal-title" id="modalTitle">Edit Profile</h2>
        <label for="editName">Name</label>
        <input type="text" id="editName" class="form-input" placeholder="Your name" />
        <label for="editBio">Bio</label>
        <textarea id="editBio" class="form-input" rows="3" placeholder="Tell us about yourself"></textarea>
        <div class="modal-actions">
          <button class="btn btn-primary" id="saveProfileBtn">Save</button>
          <button class="btn btn-secondary" id="cancelEditBtn">Cancel</button>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
